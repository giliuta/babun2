<!doctype html>
<html lang="ru">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Babun2 — Финансы · как Клиенты</title>
<style>
  /* ── Real Babun2 design tokens (copied from app/globals.css) ── */
  :root{
    --surface-grouped:#EFEFF4; --surface-card:#FFFFFF; --surface-card-secondary:#F2F2F7;
    --separator:rgba(60,60,67,0.10);
    --label:#000000; --label-secondary:#3C3C4399; --label-tertiary:rgba(60,60,67,0.30);
    --label-quaternary:rgba(60,60,67,0.18); --label-on-accent:#FFFFFF;
    --fill-tertiary:rgba(118,118,128,0.12); --fill-quaternary:rgba(116,116,128,0.08);
    --system-red:#FF3B30; --system-orange:#FF9500; --system-green:#34C759; --system-blue:#007AFF;
    --accent:#3E88F7; --accent-pressed:#2D7BE5; --accent-tint:rgba(62,136,247,0.12);
    --glass-bg:rgba(255,255,255,0.72);
    --shadow-card:0 0 0 0.5px rgba(15,23,42,0.04),0 1px 2px rgba(15,23,42,0.04);
    --font-sans:-apple-system,BlinkMacSystemFont,"SF Pro Text","SF Pro Display","Segoe UI",Roboto,Helvetica,Arial,system-ui,sans-serif;
  }
  *{box-sizing:border-box;-webkit-font-smoothing:antialiased;}
  html,body{margin:0;height:100%;}
  body{
    font-family:var(--font-sans);
    background:radial-gradient(1200px 800px at 50% -10%,#fbfbfd 0%,#e7e9ee 55%,#dfe2e8 100%);
    min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:flex-start;
    gap:14px;padding:30px 16px 60px;color:var(--label);font-variant-numeric:tabular-nums;
  }
  .caption{font-size:12.5px;color:#6b7280;letter-spacing:.01em;text-align:center;max-width:392px;line-height:1.45;}
  .caption b{color:#374151;font-weight:600;}

  /* ── Device frame ── */
  .device{
    width:414px;border:11px solid #0b0b0d;border-radius:56px;background:#0b0b0d;
    box-shadow:0 50px 90px -30px rgba(15,23,42,.55),0 10px 30px -10px rgba(15,23,42,.25);
  }
  .screen{
    width:392px;height:812px;background:var(--surface-grouped);border-radius:45px;overflow:hidden;
    position:relative;display:flex;flex-direction:column;
  }

  /* ── Status bar ── */
  .statusbar{height:48px;flex:none;display:flex;align-items:center;justify-content:space-between;
    padding:0 26px 0 30px;background:var(--surface-card);position:relative;}
  .statusbar .time{font-size:15px;font-weight:600;letter-spacing:.02em;}
  .island{position:absolute;left:50%;top:9px;transform:translateX(-50%);width:108px;height:30px;background:#000;border-radius:18px;}
  .sb-right{display:flex;align-items:center;gap:6px;}
  .sb-right svg{display:block;}

  /* ── Nav / PageHeader ── */
  .nav{height:48px;flex:none;display:flex;align-items:center;justify-content:space-between;
    padding:0 6px;background:var(--surface-card);border-bottom:.5px solid var(--separator);}
  .nav .edit{color:var(--accent);font-size:14px;font-weight:600;padding:0 10px;height:36px;display:flex;align-items:center;}
  .nav .titlewrap{display:inline-flex;align-items:center;justify-content:center;flex:1;min-width:0;}
  .nav .title{font-size:17px;font-weight:600;letter-spacing:-.01em;}
  .nav .actions{display:flex;align-items:center;gap:0;}
  .iconbtn{width:40px;height:40px;border-radius:50%;display:flex;align-items:center;justify-content:center;color:var(--accent);}
  .iconbtn.sm{width:36px;height:36px;}
  .nav .actions{position:relative;}
  .iomenu{display:none;position:absolute;top:40px;right:6px;width:214px;background:var(--surface-card);border-radius:14px;
    box-shadow:0 12px 30px -8px rgba(15,23,42,.30),0 0 0 .5px rgba(15,23,42,.06);overflow:hidden;z-index:50;}
  .iomenu.open{display:block;}
  .iorow{display:flex;align-items:center;gap:10px;height:48px;padding:0 14px;font-size:15px;color:var(--label);}
  .iorow + .iorow{border-top:.5px solid var(--separator);}
  .iorow svg{color:var(--label-secondary);flex:none;}
  .cdot{width:8px;height:8px;border-radius:50%;flex:none;}

  /* ── Scroll area ── */
  .scroll{flex:1;overflow-y:auto;background:var(--surface-grouped);}
  .scroll::-webkit-scrollbar{display:none;}
  .content{padding:12px;display:flex;flex-direction:column;gap:12px;}

  /* hero strip */
  .hero{display:flex;align-items:center;justify-content:center;gap:6px;height:32px;margin-top:-4px;
    font-size:12px;color:var(--label-secondary);}
  .hero .bday{color:var(--system-orange);}
  .hero .midot{color:var(--label-quaternary);}

  /* search */
  .search{position:relative;}
  .search .si{position:absolute;left:12px;top:50%;transform:translateY(-50%);color:var(--label-tertiary);pointer-events:none;}
  .search input{width:100%;height:40px;border-radius:10px;background:var(--surface-card);
    border:.5px solid var(--separator);box-shadow:var(--shadow-card);
    padding:0 12px 0 34px;font-size:15px;color:var(--label);font-family:inherit;}
  .search input::placeholder{color:var(--label-tertiary);}

  /* segment chips (v21: uniform filter row + result line) */
  .chips{display:flex;gap:6px;overflow-x:auto;padding:2px 4px;margin:0 -4px;
    -webkit-mask-image:linear-gradient(to right,#000 calc(100% - 18px),transparent 100%);
    mask-image:linear-gradient(to right,#000 calc(100% - 18px),transparent 100%);}
  .chips::-webkit-scrollbar{display:none;}
  .chip{flex:none;display:inline-flex;align-items:center;gap:5px;height:32px;padding:0 12px;border-radius:9999px;
    font-size:12.5px;font-weight:600;white-space:nowrap;cursor:pointer;border:1px solid transparent;font-family:inherit;
    transition:background .15s,border-color .15s,color .15s,transform .1s;}
  .chip:active{transform:scale(.97);}
  .chip.sort{margin-right:7px;}   /* visual gap: reorder control vs the narrowing filters */
  .chip.idle{background:var(--surface-card);border-color:var(--separator);color:var(--label);box-shadow:var(--shadow-card);}
  .chip.idle .cnt{color:var(--label-tertiary);}
  .chip.on-accent{background:var(--accent);color:#fff;border-color:var(--accent);}
  .chip.on-accent .cnt{opacity:.9;}
  .chip .pillcount{background:rgba(255,255,255,.26);color:#fff;border-radius:9999px;min-width:18px;height:18px;
    padding:0 5px;font-size:11px;font-weight:700;display:inline-flex;align-items:center;justify-content:center;}
  .chip.on-sort{background:var(--accent-tint);border-color:transparent;color:var(--accent);}
  .chip.on-sort .sortic{color:var(--accent);}
  .chip.idle .sortic{color:var(--label-tertiary);}
  /* result line: live count + clear-all */
  .resultline{display:flex;align-items:center;gap:8px;font-size:12px;color:var(--label-secondary);
    padding:1px 4px 0;min-height:18px;}
  .resultline .rc{font-weight:700;color:var(--label);font-variant-numeric:tabular-nums;}
  .resultline .grow{flex:1;}
  .resultline .clearall{color:var(--accent);font-weight:600;cursor:pointer;display:inline-flex;align-items:center;gap:3px;}
  .resultline .clearall:active{opacity:.55;}
  .resultline .clearall.hide{visibility:hidden;}
  .empty-reset{margin:14px auto 0;display:inline-flex;align-items:center;justify-content:center;height:38px;padding:0 18px;
    border-radius:11px;background:var(--accent-tint);color:var(--accent);font-size:14px;font-weight:600;cursor:pointer;}
  .empty-reset:active{background:var(--accent);color:#fff;}
  /* per-value count inside facet popups */
  .fmodal-row .sub{margin-left:auto;color:var(--label-tertiary);font-size:13px;font-variant-numeric:tabular-nums;padding-right:8px;}
  .fmodal-row.sel .sub{color:var(--accent);}
  .fmodal-clear{position:absolute;top:0;right:0;height:45px;display:flex;align-items:center;padding:0 15px;
    color:var(--accent);font-size:13px;font-weight:600;cursor:pointer;z-index:2;}
  .fmodal-clear.dim{color:var(--label-tertiary);pointer-events:none;}
  .sep{align-self:center;color:var(--separator);padding:0 2px;}
  .tagchip{flex:none;display:inline-flex;align-items:center;gap:4px;height:32px;padding:0 12px;border-radius:9999px;
    font-size:12px;font-weight:600;white-space:nowrap;border:1px solid var(--separator);
    background:var(--surface-card);color:var(--label-secondary);}
  /* v7: dropdown filter chips + centered picker modal */
  .fchip{gap:5px;}
  .fchip > svg{flex:none;}
  .chip.idle.fchip > svg{color:var(--label-tertiary);}
  .fdotc{width:9px;height:9px;border-radius:50%;flex:none;}
  .emptyf{text-align:center;color:var(--label-tertiary);font-size:14px;padding:44px 0;}
  /* v22: native bottom-sheet shell (Apple/Material idiom for "choose from a set"; live results show through) */
  .fmodal-backdrop{position:absolute;inset:0;z-index:80;background:rgba(0,0,0,.18);
    display:flex;align-items:flex-end;justify-content:center;opacity:0;transition:opacity .22s ease;}
  .fmodal-backdrop.show{opacity:1;}
  .fmodal{position:relative;width:100%;max-width:100%;max-height:88%;overflow-y:auto;background:var(--surface-card);
    border-radius:20px 20px 0 0;box-shadow:0 -14px 44px -14px rgba(15,23,42,.34),0 0 0 .5px rgba(15,23,42,.05);
    padding-bottom:8px;transform:translateY(100%);transition:transform .34s cubic-bezier(.32,.72,0,1);
    overscroll-behavior:contain;}
  .fmodal-backdrop.show .fmodal{transform:translateY(0);}
  .fmodal-grab{height:5px;width:38px;border-radius:3px;background:var(--label-quaternary);margin:8px auto 2px;
    flex:none;touch-action:none;cursor:grab;}
  .fmodal-back{position:absolute;top:10px;left:8px;width:34px;height:34px;display:flex;align-items:center;justify-content:center;
    color:var(--accent);border-radius:50%;cursor:pointer;z-index:3;}
  .fmodal-back:active{background:var(--fill-tertiary);}
  .fmodal-title{position:sticky;top:0;background:var(--surface-card);padding:6px 16px 12px;border-bottom:.5px solid var(--separator);
    font-size:16px;font-weight:700;text-align:center;color:var(--label);z-index:1;}
  .fmodal-row{display:flex;align-items:center;justify-content:space-between;gap:10px;padding:0 16px;min-height:48px;
    border-bottom:.5px solid var(--separator);cursor:pointer;}
  .fmodal-row:last-child{border-bottom:0;}
  .fmodal-row:active{background:var(--fill-quaternary);}
  .fmodal-row .fl{display:flex;align-items:center;gap:10px;min-width:0;}
  .fmodal-row .lbl{font-size:15px;color:var(--label);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .fmodal-row.sel{background:var(--accent-tint);}
  .fmodal-row.sel .lbl{color:var(--accent);font-weight:600;}
  .fmodal-row .ck{flex:none;color:var(--accent);}
  .fmodal-row.sel .ck{animation:ckpop .2s cubic-bezier(.32,.72,0,1);}
  @keyframes ckpop{from{transform:scale(.3);opacity:0;}to{transform:scale(1);opacity:1;}}
  /* .fmodal-done removed — modal now closes on tap outside */
  /* v15: period custom-range calendar (no native inputs) */
  .pcal{padding:6px 12px 14px;}
  .pcal-top{display:flex;justify-content:flex-end;height:30px;align-items:center;margin:0 -4px 2px;}
  .pcal-x{width:30px;height:30px;display:flex;align-items:center;justify-content:center;color:var(--label-secondary);cursor:pointer;border-radius:50%;}
  .pcal-x:active{background:var(--fill-tertiary);}
  .pcal-fields{display:flex;gap:8px;margin-bottom:8px;}
  .pcal-field{flex:1;border-radius:12px;background:var(--fill-tertiary);padding:7px 12px;display:flex;flex-direction:column;gap:1px;}
  .pcal-field.active{background:var(--accent-tint);box-shadow:inset 0 0 0 1.5px var(--accent);}
  .pcal-field .fl-lbl{font-size:11px;color:var(--label-tertiary);}
  .pcal-field .fl-val{font-size:15px;font-weight:600;color:var(--label);}
  .pcal-field.active .fl-val{color:var(--accent);}
  .frow-ic{color:var(--label-tertiary);display:flex;flex:none;}
  .pcal-nav{display:flex;align-items:center;justify-content:space-between;height:38px;padding:0 2px;}
  .pcal-arrow{width:34px;height:34px;display:flex;align-items:center;justify-content:center;color:var(--accent);cursor:pointer;border-radius:50%;}
  .pcal-arrow:active{background:var(--fill-tertiary);}
  .pcal-month{font-size:15px;font-weight:600;color:var(--label);}
  .pcal-wd{display:grid;grid-template-columns:repeat(7,1fr);margin-top:2px;}
  .pcal-wd span{text-align:center;font-size:11px;font-weight:600;color:var(--label-tertiary);padding:4px 0;}
  .pcal-grid{display:grid;grid-template-columns:repeat(7,1fr);}
  .pc-empty{height:38px;}
  .pc-day{height:38px;display:flex;align-items:center;justify-content:center;font-size:14px;color:var(--label);cursor:pointer;}
  .pc-day:active{background:var(--fill-quaternary);}
  .pc-today{color:var(--accent);font-weight:700;}
  .pc-mid{background:var(--accent-tint);}
  .pc-edge{background:var(--accent);color:#fff;font-weight:600;border-radius:10px;}
  /* v17: period custom-range — iOS wheel pickers (day / month / year), С + До */
  .wrange{display:flex;align-items:center;justify-content:center;gap:8px;font-size:14px;font-weight:600;
    color:var(--label);padding:0 0 8px;}
  .wrange .warrow{color:var(--label-tertiary);font-weight:400;}
  .wpick{padding:0 0 4px;}
  .wpick + .wpick{border-top:.5px solid var(--separator);padding-top:6px;}
  .wpick-hd{font-size:11px;font-weight:700;letter-spacing:.04em;text-transform:uppercase;
    color:var(--label-secondary);padding:2px 4px 2px;}
  .wheels{position:relative;display:flex;height:150px;}
  .wheel{flex:1 1 auto;overflow-y:scroll;scroll-snap-type:y mandatory;text-align:center;
    -webkit-overflow-scrolling:touch;scrollbar-width:none;
    -webkit-mask-image:linear-gradient(to bottom,transparent 0,#000 30%,#000 70%,transparent 100%);
    mask-image:linear-gradient(to bottom,transparent 0,#000 30%,#000 70%,transparent 100%);}
  .wheel::-webkit-scrollbar{display:none;}
  .wheel.wheel-day{flex:0 0 58px;}
  .wheel.wheel-year{flex:0 0 76px;}
  .wopt{height:30px;line-height:30px;scroll-snap-align:center;font-size:17px;color:var(--label-tertiary);
    font-variant-numeric:tabular-nums;white-space:nowrap;}
  .wopt.cur{color:var(--label);font-weight:600;}
  .wspacer{height:60px;}
  .wband{position:absolute;left:6px;right:6px;top:50%;height:30px;transform:translateY(-50%);
    pointer-events:none;background:var(--fill-quaternary);border-radius:8px;}
  .wdone{margin-top:8px;height:44px;border-radius:12px;background:var(--accent);color:#fff;
    font-size:15px;font-weight:600;display:flex;align-items:center;justify-content:center;cursor:pointer;}
  .wdone:active{background:var(--accent-pressed);}
  /* v20: period custom-range view — segmented С/До + wheels, inside the shared .fmodal */
  .pcv{padding:8px 14px 14px;}
  .seg2{display:flex;gap:3px;background:var(--fill-tertiary);border-radius:13px;padding:3px;margin:0 0 12px;}
  .seg2-b{flex:1;height:48px;border-radius:10px;display:flex;flex-direction:column;align-items:center;justify-content:center;
    gap:1px;cursor:pointer;transition:background .18s;}
  .seg2-b.on{background:var(--surface-card);box-shadow:var(--shadow-card);}
  .seg2-b .k{font-size:11px;font-weight:600;color:var(--label-tertiary);}
  .seg2-b.on .k{color:var(--accent);}
  .seg2-b .v{font-size:15px;font-weight:700;color:var(--label);}

  /* ── v23: one summary bar + one centered «Фильтры» panel ── */
  /* entry summary bar */
  .filterbar{display:flex;align-items:center;gap:8px;min-height:44px;padding:7px 12px;border-radius:12px;
    background:var(--surface-card);border:.5px solid var(--separator);box-shadow:var(--shadow-card);cursor:pointer;
    flex-wrap:wrap;transition:transform .1s;}
  .filterbar:active{transform:scale(.992);}
  .fb-main{display:inline-flex;align-items:center;gap:7px;flex:none;}
  .fb-ic{color:var(--label-secondary);display:flex;}
  .fb-ic.on{color:var(--accent);}
  .fb-word{font-size:15px;font-weight:600;color:var(--label);}
  .fb-badge{min-width:19px;height:19px;padding:0 5px;border-radius:9999px;background:var(--accent);color:#fff;
    font-size:11px;font-weight:700;display:inline-flex;align-items:center;justify-content:center;}
  .fb-right{margin-left:auto;display:inline-flex;align-items:center;gap:4px;font-size:13px;color:var(--label-tertiary);}
  .fb-right .fb-chev{display:flex;color:var(--label-quaternary);}
  .fb-toks{display:flex;flex-wrap:wrap;gap:6px;flex:1;min-width:0;}
  .fb-tok{display:inline-flex;align-items:center;gap:5px;height:26px;padding:0 4px 0 9px;border-radius:9999px;
    background:var(--fill-tertiary);font-size:12.5px;font-weight:600;color:var(--label);}
  .fb-tok .fdotc{width:7px;height:7px;}
  .fb-x{width:18px;height:18px;border-radius:50%;display:inline-flex;align-items:center;justify-content:center;
    color:var(--label-tertiary);}
  .fb-x:active{background:var(--fill-quaternary);}
  .fbresult{display:flex;align-items:center;gap:8px;min-height:0;height:0;overflow:hidden;font-size:12px;
    color:var(--label-secondary);padding:0 4px;transition:height .18s ease;}
  .fbresult.show{height:20px;margin-top:2px;}
  .fbresult .rc{font-weight:700;color:var(--label);font-variant-numeric:tabular-nums;}
  .fbresult .grow{flex:1;}
  .fbresult .clearall{color:var(--accent);font-weight:600;cursor:pointer;}
  .fbresult .clearall:active{opacity:.55;}

  /* centered panel */
  .fpanel-backdrop{position:absolute;inset:0;z-index:80;background:rgba(0,0,0,.42);
    -webkit-backdrop-filter:blur(8px);backdrop-filter:blur(8px);
    display:flex;align-items:center;justify-content:center;padding:18px;opacity:0;transition:opacity .22s ease;}
  .fpanel-backdrop.show{opacity:1;}
  .fpanel{width:100%;max-width:344px;max-height:84%;display:flex;flex-direction:column;background:var(--surface-card);
    border-radius:24px;box-shadow:0 24px 60px -12px rgba(15,23,42,.34),0 0 0 .5px rgba(15,23,42,.06);
    transform:scale(.92);opacity:.4;transition:transform .26s cubic-bezier(.32,1.3,.5,1),opacity .2s ease;overflow:hidden;}
  .fpanel-backdrop.show .fpanel{transform:scale(1);opacity:1;}
  .fpanel-head{position:relative;display:flex;align-items:center;justify-content:center;height:52px;flex:none;
    border-bottom:.5px solid var(--separator);padding:0 50px;}
  .fpanel-title{font-size:17px;font-weight:700;color:var(--label);}
  .fpanel-clear{position:absolute;left:0;top:0;height:52px;display:flex;align-items:center;padding:0 16px;
    color:var(--accent);font-size:15px;font-weight:600;cursor:pointer;}
  .fpanel-clear.dim{color:var(--label-tertiary);pointer-events:none;}
  .fpanel-x{position:absolute;right:8px;top:9px;width:34px;height:34px;border-radius:50%;display:flex;align-items:center;
    justify-content:center;color:var(--label-secondary);cursor:pointer;}
  .fpanel-x:active{background:var(--fill-tertiary);}
  .fpanel-body{flex:1;overflow-y:auto;padding:6px 16px 12px;-webkit-overflow-scrolling:touch;}
  .fpanel-foot{flex:none;border-top:.5px solid var(--separator);padding:10px 16px calc(10px + env(safe-area-inset-bottom));
    background:var(--surface-card);}
  .fpbtn{height:50px;border-radius:14px;background:var(--accent);color:#fff;font-size:16px;font-weight:600;
    display:flex;align-items:center;justify-content:center;cursor:pointer;transition:background .15s,transform .1s;
    box-shadow:0 6px 16px -6px rgba(62,136,247,.55);}
  .fpbtn:active{background:var(--accent-pressed);transform:scale(.99);}
  .fpbtn.empty{background:var(--fill-tertiary);color:var(--label-tertiary);}
  /* sections */
  .fsection{padding:18px 0 8px;border-top:.5px solid var(--separator);}
  .fsection:first-child{border-top:0;padding-top:10px;}
  .fsection-cap{display:flex;align-items:center;gap:9px;font-size:12px;font-weight:700;letter-spacing:.05em;
    text-transform:uppercase;color:var(--label-secondary);margin-bottom:13px;}
  .fsection-cap .capic{width:25px;height:25px;border-radius:7px;background:var(--accent-tint);color:var(--accent);
    display:inline-flex;align-items:center;justify-content:center;flex:none;}
  /* sort pills (single-select, 2-col) */
  .sortgrid{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
  .sortpill{display:inline-flex;align-items:center;gap:5px;justify-content:center;height:42px;border-radius:12px;
    background:var(--fill-tertiary);color:var(--label);font-size:13.5px;font-weight:600;cursor:pointer;font-family:inherit;
    border:1.5px solid transparent;transition:background .12s,border-color .12s,transform .1s;}
  .sortpill:active{transform:scale(.97);}
  .sortpill.sel{background:var(--accent-tint);border-color:var(--accent);color:var(--accent);}
  .sortpill.sel svg{animation:ckpop .2s cubic-bezier(.32,.72,0,1);}
  .sortpill svg{flex:none;}
  /* token chips (multi/single facets + period presets) */
  .tokwrap{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
  .tok{display:inline-flex;align-items:center;gap:7px;height:42px;padding:0 13px;border-radius:12px;
    background:var(--fill-tertiary);color:var(--label);font-size:13.5px;font-weight:600;cursor:pointer;font-family:inherit;

 case 'old':a.sort((x,y)=>x.date.localeCompare(y.date));break;
 case 'big':a.sort((x,y)=>y.amt-x.amt);break;
 case 'small':a.sort((x,y)=>x.amt-y.amt);break;
 default:a.sort((x,y)=>y.date.localeCompare(x.date));}return a;}
const FACET_FIELD={team:'brig',acct:'acct',type:'type'};
const valOf=(o,key)=> key==='type'?TYPE_OF[o.type]:o[FACET_FIELD[key]];
const periodOk=o=>!filters.period||(o.date>=filters.period.from&&o.date<=filters.period.to);
function visibleOps(){return sortOps(ops.filter(o=>
  (filters.team.length===0||filters.team.includes(o.brig)) &&
  (filters.acct.length===0||filters.acct.includes(o.acct)) &&
  (filters.type.length===0||filters.type.includes(TYPE_OF[o.type])) &&
  periodOk(o)));}
const activeCount=()=>(filters.team.length?1:0)+(filters.acct.length?1:0)+(filters.type.length?1:0)+(filters.period?1:0);
const pluralOps=n=>{const a=n%100,b=n%10;if(a>10&&a<20)return 'операций';if(b===1)return 'операция';if(b>=2&&b<=4)return 'операции';return 'операций';};
function clearAllFilters(){filters.team=[];filters.acct=[];filters.type=[];filters.period=null;renderCards();}

function cardHTML(o){
 const col=TEAM_COLORS[o.brig]||'#8E8E93';
 const amtColor=o.type==='income'?'var(--system-green)':o.type==='expense'?'var(--system-red)':'var(--label-secondary)';
 const sign=o.type==='income'?'+':o.type==='expense'?'−':'';
 const segs=[];const add=(t,first)=>segs.push(`<span class="seg${first?' mfirst':''}">${t}</span>`);
 let first=true; if(o.cat){add(o.cat,first);first=false;} add(o.acct,first);first=false; add(o.brig);
 const clock='<svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="9"/><path d="M12 7.5V12l3 2"/></svg>';
 add(clock+humanShort(o.date));
 return `<div class="card" data-op>
   <div class="avatar" style="background:${tagAlpha(col,0.16)};font-size:20px">${o.icon}</div>
   <div class="cbody">
     <div class="r1"><span class="name">${o.t}</span></div>
     <div class="money"><span style="color:${amtColor};font-size:14px;font-weight:700">${sign}${eur(o.amt)}</span></div>
     <div class="meta">${segs.join('')}</div>
   </div></div>`;
}

// ── period wheel infra (copied from Clients verbatim) ──
const M_GEN=['января','февраля','марта','апреля','мая','июня','июля','августа','сентября','октября','ноября','декабря'];
const M_NOM=['Январь','Февраль','Март','Апрель','Май','Июнь','Июль','Август','Сентябрь','Октябрь','Ноябрь','Декабрь'];
const pad=n=>String(n).padStart(2,'0');
const ymd=(y,mo,d)=>`${y}-${pad(mo+1)}-${pad(d)}`;
const fmtShort=d=>{const[y,mo,dd]=d.split('-').map(Number);return `${dd} ${M_GEN[mo-1].slice(0,3)}`;};
const humanShort=d=>{const[y,mo,dd]=d.split('-').map(Number);return `${dd} ${M_GEN[mo-1].slice(0,3)}`;};
const human=d=>{const[y,mo,dd]=d.split('-').map(Number);return `${dd} ${M_GEN[mo-1]} ${y}`;};
const shortD=st=>`${st.d} ${M_NOM[st.m].slice(0,3).toLowerCase()} ${String(st.y).slice(2)}`;
const IH=30;const YEARS=[];for(let y=2020;y<=2030;y++)YEARS.push(y);
const dimDays=(y,mo)=>new Date(y,mo+1,0).getDate();
const markCur=(w,idx)=>w.querySelectorAll('.wopt').forEach(o=>o.classList.toggle('cur',+o.dataset.i===idx));
function makeWheel(w,count,label,initIdx,onCommit){
 w.innerHTML='<div class="wspacer"></div>'+Array.from({length:count},(_,i)=>`<div class="wopt" data-i="${i}">${label(i)}</div>`).join('')+'<div class="wspacer"></div>';
 let suppress=true,t;w.scrollTop=initIdx*IH;markCur(w,initIdx);setTimeout(()=>{suppress=false;},160);
 w.onscroll=()=>{const idx=Math.max(0,Math.min(count-1,Math.round(w.scrollTop/IH)));markCur(w,idx);if(suppress)return;clearTimeout(t);t=setTimeout(()=>onCommit(idx),90);};}
function buildPicker(root,st,onChange){
 root.innerHTML='<div class="wheels"><div class="wheel wheel-day"></div><div class="wheel wheel-mon"></div><div class="wheel wheel-year"></div><div class="wband"></div></div>';
 const dEl=root.querySelector('.wheel-day'),mEl=root.querySelector('.wheel-mon'),yEl=root.querySelector('.wheel-year');
 function buildDay(){const max=dimDays(st.y,st.m);if(st.d>max)st.d=max;makeWheel(dEl,max,i=>String(i+1),st.d-1,i=>{st.d=i+1;onChange();});}
 buildDay();makeWheel(mEl,12,i=>M_NOM[i],st.m,i=>{st.m=i;buildDay();onChange();});
 const yi=YEARS.indexOf(st.y);makeWheel(yEl,YEARS.length,i=>String(YEARS[i]),yi<0?6:yi,i=>{st.y=YEARS[i];buildDay();onChange();});}
const TODAY='2026-06-15';
const dAgo=n=>{const d=new Date(2026,5,15);d.setDate(d.getDate()-n);return ymd(d.getFullYear(),d.getMonth(),d.getDate());};
const PRESETS=[{k:'all',l:'Всё время',from:null,to:null},{k:'today',l:'Сегодня',from:TODAY,to:TODAY},
 {k:'7d',l:'7 дней',from:dAgo(6),to:TODAY},{k:'30d',l:'30 дней',from:dAgo(29),to:TODAY},
 {k:'month',l:'Этот месяц',from:'2026-06-01',to:'2026-06-30'},{k:'prev',l:'Прошлый месяц',from:'2026-05-01',to:'2026-05-31'},
 {k:'year',l:'Этот год',from:'2026-01-01',to:'2026-12-31'}];
const periodLabel=p=>p.k==='custom'?`${fmtShort(p.from)} – ${fmtShort(p.to)}`:((PRESETS.find(x=>x.k===p.k)||{}).l||'Период');

const FACETS=[
 {key:'team',cap:'Команда',glyph:G_TEAM,items:teams,colors:TEAM_COLORS},
 {key:'acct',cap:'Счёт',glyph:G_ACCT,items:accts,colors:ACCT_COLORS},
 {key:'type',cap:'Тип',glyph:G_TYPE,items:types,colors:TYPE_COLORS},
];
function ctxCount(key,val){return ops.filter(o=>{ if(valOf(o,key)!==val)return false;
  for(const k of ['team','acct','type']){if(k===key)continue;const arr=filters[k];if(arr.length&&!arr.includes(valOf(o,k)))return false;}
  return periodOk(o);}).length;}
function activeTokens(){const out=[];
 filters.team.forEach(v=>out.push({key:'team',val:v,label:v,color:TEAM_COLORS[v]}));
 filters.acct.forEach(v=>out.push({key:'acct',val:v,label:v,color:ACCT_COLORS[v]}));
 filters.type.forEach(v=>out.push({key:'type',val:v,label:v,color:TYPE_COLORS[v]}));
 if(filters.period)out.push({key:'period',val:'',label:periodLabel(filters.period),color:'var(--accent)'});
 return out;}
function removeToken(key,val){if(key==='period')filters.period=null;else{const a=filters[key];const i=a.indexOf(val);if(i>=0)a.splice(i,1);}renderCards();}

function periodProfit(){const v=visibleOps();const inc=v.filter(o=>o.type==='income').reduce((s,o)=>s+o.amt,0);const exp=v.filter(o=>o.type==='expense').reduce((s,o)=>s+o.amt,0);return {inc,exp,prof:inc-exp};}

function renderCards(){
 const list=visibleOps();
 document.getElementById('cards').innerHTML=list.length?list.map(cardHTML).join(''):'<div class="emptyf">Ничего не нашлось по фильтру<div class="empty-reset" id="emptyReset">Сбросить фильтры</div></div>';
 document.getElementById('emptyReset')?.addEventListener('click',clearAllFilters);
 renderBar();
}
function renderBar(){
 const bar=document.getElementById('filterbar');const rl=document.getElementById('fbResult');
 const toks=activeTokens();const n=visibleOps().length;const p=periodProfit();
 const summary=`<span>Прибыль <span class="rc" style="color:${p.prof<0?'var(--system-red)':'var(--label)'}">${eur(p.prof)}</span></span><span style="color:var(--label-tertiary)">· Доход <span style="color:var(--system-green);font-weight:600">${eur(p.inc)}</span> · Расход <span style="color:var(--system-red);font-weight:600">${eur(p.exp)}</span></span>`;
 if(toks.length===0){
   bar.innerHTML=`<span class="fb-main"><span class="fb-ic">${FUNNEL}</span><span class="fb-word">Фильтры</span></span><span class="fb-right">${n} ${pluralOps(n)} <span class="fb-chev">${CHEVR}</span></span>`;
   rl.className='fbresult show';rl.innerHTML=summary;
 }else{
   const tokens=toks.map(t=>`<span class="fb-tok" data-key="${t.key}" data-val="${t.val}"><span class="fdotc" style="background:${t.color}"></span>${t.label}<span class="fb-x">${XSMALL}</span></span>`).join('');
   bar.innerHTML=`<span class="fb-main"><span class="fb-ic on">${FUNNEL}</span><span class="fb-badge">${activeCount()}</span></span><span class="fb-toks">${tokens}</span>`;
   rl.className='fbresult show';rl.innerHTML=`${summary}<span class="grow"></span><span class="clearall" id="fbClear">Сбросить</span>`;
   rl.querySelector('#fbClear').addEventListener('click',clearAllFilters);
 }
 bar.querySelectorAll('.fb-x').forEach(x=>x.addEventListener('click',e=>{e.stopPropagation();const t=x.closest('.fb-tok');removeToken(t.dataset.key,t.dataset.val);}));
}

function openFilterPanel(){
 const m=document.createElement('div');m.className='fpanel-backdrop';
 m.innerHTML=`<div class="fpanel"><div class="fpanel-head"><span class="fpanel-clear" id="fpClear">Сбросить</span><span class="fpanel-title">Фильтры</span><span class="fpanel-x" id="fpX">${XBIG}</span></div><div class="fpanel-body" id="fpBody"></div><div class="fpanel-foot"><div class="fpbtn" id="fpShow"></div></div></div>`;
 const body=m.querySelector('#fpBody');const close=()=>{m.classList.remove('show');setTimeout(()=>m.remove(),240);};
 let customOpen=!!(filters.period&&filters.period.k==='custom');
 function secSort(){const pills=SORTS.map(s=>`<button class="sortpill${sort===s.k?' sel':''}" data-act="sort" data-k="${s.k}">${sort===s.k?CHECK:''}${s.l}</button>`).join('');
   return `<div class="fsection"><div class="fsection-cap"><span class="capic">${G_SORT}</span>Порядок</div><div class="sortgrid">${pills}</div></div>`;}
 function secFacet(cfg){const sel=filters[cfg.key];
   const chips=cfg.items.map(v=>{const on=sel.includes(v);const cnt=ctxCount(cfg.key,v);const zero=cnt===0&&!on;
     return `<button class="tok${on?' sel':''}${zero?' zero':''}" data-act="facet" data-key="${cfg.key}" data-val="${v}"><span class="fdotc" style="background:${cfg.colors[v]}"></span><span class="tok-l">${v}</span><span class="tok-c">${cnt}</span>${on?`<span class="tok-ck">${CHECK}</span>`:''}</button>`;}).join('');
   return `<div class="fsection"><div class="fsection-cap"><span class="capic">${cfg.glyph}</span>${cfg.cap}</div><div class="tokwrap">${chips}</div></div>`;}
 function secPeriod(){const curK=filters.period?filters.period.k:'all';
   const chips=PRESETS.map(p=>`<button class="tok${curK===p.k?' sel':''}" data-act="preset" data-k="${p.k}"><span class="tok-l">${p.l}</span>${curK===p.k?`<span class="tok-ck">${CHECK}</span>`:''}</button>`).join('');
   const onC=curK==='custom';const cLbl=onC?periodLabel(filters.period):'Свой диапазон';
   const customChip=`<button class="tok tokwide${onC?' sel':''}" data-act="custom"><span class="tok-l">${G_CAL} ${cLbl}</span>${onC?`<span class="tok-ck">${CHECK}</span>`:`<span class="tok-chev">${CHEVR}</span>`}</button>`;
   const wheel=customOpen?`<div class="fwheel"><div class="wrange" id="wRange"></div><div class="seg2"><div class="seg2-b on" data-e="from"><span class="k">С</span><span class="v" id="segFrom"></span></div><div class="seg2-b" data-e="to"><span class="k">До</span><span class="v" id="segTo"></span></div></div><div class="wpick" id="wPick"></div></div>`:'';
   return `<div class="fsection"><div class="fsection-cap"><span class="capic">${G_CAL}</span>Период</div><div class="tokwrap">${chips}${customChip}</div>${wheel}</div>`;}
 function updateFoot(){const n=visibleOps().length;const b=m.querySelector('#fpShow');b.textContent=n>0?`Показать ${n} ${pluralOps(n)}`:'Ничего не найдено';b.classList.toggle('empty',n===0);}
 function updateClear(){m.querySelector('#fpClear').classList.toggle('dim',activeCount()===0);}
 function mountWheel(){let sf,st0;
   if(filters.period&&filters.period.k==='custom'){const a=filters.period.from.split('-').map(Number),b=filters.period.to.split('-').map(Number);sf={y:a[0],m:a[1]-1,d:a[2]};st0={y:b[0],m:b[1]-1,d:b[2]};}
   else{sf={y:2026,m:5,d:1};st0={y:2026,m:5,d:15};}
   const fromSt={...sf},toSt={...st0};let active='from';const wPick=body.querySelector('#wPick');if(!wPick)return;
   const refresh=()=>{const r=body.querySelector('#wRange');if(r)r.innerHTML=`<span>${human(ymd(fromSt.y,fromSt.m,fromSt.d))}</span><span class="warrow">→</span><span>${human(ymd(toSt.y,toSt.m,toSt.d))}</span>`;const a2=body.querySelector('#segFrom'),b2=body.querySelector('#segTo');if(a2)a2.textContent=shortD(fromSt);if(b2)b2.textContent=shortD(toSt);};
   const applyNow=()=>{let a=ymd(fromSt.y,fromSt.m,fromSt.d),b=ymd(toSt.y,toSt.m,toSt.d);if(a>b){const t=a;a=b;b=t;}filters.period={k:'custom',from:a,to:b};renderCards();updateFoot();updateClear();};
   const buildActive=()=>buildPicker(wPick,active==='from'?fromSt:toSt,()=>{applyNow();refresh();});
   buildActive();refresh();
   body.querySelectorAll('.seg2-b').forEach(bb=>bb.addEventListener('click',()=>{active=bb.dataset.e;body.querySelectorAll('.seg2-b').forEach(x=>x.classList.toggle('on',x.dataset.e===active));buildActive();}));}
 function render(){body.innerHTML=secSort()+FACETS.map(secFacet).join('')+secPeriod();if(customOpen)mountWheel();updateFoot();updateClear();}
 render();
 body.addEventListener('click',e=>{const b=e.target.closest('[data-act]');if(!b)return;const act=b.dataset.act;
   if(act==='sort'){sort=b.dataset.k;renderCards();render();}
   else if(act==='facet'){const k=b.dataset.key,v=b.dataset.val;const a=filters[k];const i=a.indexOf(v);if(i>=0)a.splice(i,1);else a.push(v);renderCards();render();}
   else if(act==='preset'){const k=b.dataset.k;if(k==='all')filters.period=null;else{const p=PRESETS.find(x=>x.k===k);filters.period={k,from:p.from,to:p.to};}customOpen=false;renderCards();render();}
   else if(act==='custom'){customOpen=!customOpen;if(customOpen&&!(filters.period&&filters.period.k==='custom')){filters.period={k:'custom',from:'2026-06-01',to:'2026-06-15'};renderCards();}render();}
 });
 m.querySelector('#fpClear').addEventListener('click',()=>{clearAllFilters();customOpen=false;render();});
 m.querySelector('#fpX').addEventListener('click',close);
 m.querySelector('#fpShow').addEventListener('click',close);
 m.addEventListener('click',e=>{if(e.target===m)close();});
 document.querySelector('.screen').appendChild(m);requestAnimationFrame(()=>m.classList.add('show'));
}

document.getElementById('filterbar').addEventListener('click',openFilterPanel);
document.getElementById('settingsBtn').addEventListener('click',()=>toastMsg('⚙ Настройки финансов'));
document.getElementById('addBtn').addEventListener('click',()=>toastMsg('+ Операция'));
document.getElementById('cards').addEventListener('click',e=>{if(e.target.closest('[data-op]'))toastMsg('Операция → возврат / инвойс / удалить');});
let _tt;function toastMsg(m){let el=document.getElementById('toast');if(!el){el=document.createElement('div');el.id='toast';el.style.cssText='position:absolute;left:50%;bottom:96px;transform:translateX(-50%);background:rgba(20,22,28,.92);color:#fff;font-size:13px;font-weight:500;padding:9px 16px;border-radius:12px;z-index:90;transition:opacity .2s;max-width:80%;text-align:center';document.querySelector('.screen').appendChild(el);}el.textContent=m;el.style.opacity='1';clearTimeout(_tt);_tt=setTimeout(()=>el.style.opacity='0',1500);}
renderCards();
</script>
