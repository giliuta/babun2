<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#3E88F7"/>
      <stop offset="60%" stop-color="#2A6BD9"/>
      <stop offset="100%" stop-color="#1B4FAA"/>
    </linearGradient>
    <linearGradient id="logoGlow" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="1"/>
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0.85"/>
    </linearGradient>
    <radialGradient id="halo" cx="0.85" cy="0.15" r="0.7">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#halo)"/>

  <g transform="translate(96 110)">
    <rect x="0" y="0" width="92" height="92" rx="22" ry="22" fill="url(#logoGlow)"/>
    <text x="46" y="68" text-anchor="middle"
          font-family="system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif"
          font-size="58" font-weight="800" fill="#1B4FAA" letter-spacing="-2">B</text>
    <text x="120" y="68"
          font-family="system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif"
          font-size="56" font-weight="700" fill="#FFFFFF" letter-spacing="-1.5">Babun</text>
  </g>

  <text x="96" y="320"
        font-family="system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif"
        font-size="76" font-weight="700" fill="#FFFFFF" letter-spacing="-2.5">CRM для</text>
  <text x="96" y="406"
        font-family="system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif"
        font-size="76" font-weight="700" fill="#FFFFFF" letter-spacing="-2.5">сервисного бизнеса</text>

  <text x="96" y="490"
        font-family="system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif"
        font-size="30" font-weight="500" fill="#FFFFFF" fill-opacity="0.85" letter-spacing="-0.5">Клиенты, расписание, команда — всё в одном месте.</text>

  <g transform="translate(96 540)">
    <rect width="280" height="58" rx="14" ry="14" fill="#FFFFFF"/>
    <text x="140" y="38" text-anchor="middle"
          font-family="system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif"
          font-size="22" font-weight="600" fill="#1B4FAA" letter-spacing="-0.3">babun.app</text>
  </g>

  <g transform="translate(820 180)" opacity="0.9">
    <rect x="0" y="0" width="240" height="430" rx="40" ry="40" fill="#0E1A33"/>
    <rect x="14" y="14" width="212" height="402" rx="28" ry="28" fill="#0F2553"/>
    <rect x="38" y="58" width="164" height="48" rx="10" fill="#3E88F7"/>
    <rect x="38" y="124" width="120" height="14" rx="4" fill="#FFFFFF" fill-opacity="0.85"/>
    <rect x="38" y="146" width="80" height="10" rx="3" fill="#FFFFFF" fill-opacity="0.55"/>
    <rect x="38" y="178" width="164" height="46" rx="10" fill="#FFFFFF" fill-opacity="0.10"/>
    <rect x="38" y="232" width="164" height="46" rx="10" fill="#FFFFFF" fill-opacity="0.10"/>
    <rect x="38" y="286" width="164" height="46" rx="10" fill="#FFFFFF" fill-opacity="0.10"/>
