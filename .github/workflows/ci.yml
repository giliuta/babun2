name: CI
on:
  pull_request:
    types: [opened, synchronize, reopened]
  push:
    branches: [master]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

defaults:
  run:
    working-directory: babun-crm

jobs:
  install:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 22, cache: npm, cache-dependency-path: babun-crm/package.json }
      - run: npm install --no-audit --no-fund

  typecheck:
    needs: install
    runs-on: ubuntu-latest
    defaults: { run: { working-directory: babun-crm/apps/web } }
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 22, cache: npm, cache-dependency-path: babun-crm/package.json }
      - run: cd .. && npm install --no-audit --no-fund
      - run: npx tsc --noEmit

  test:
    needs: install
    runs-on: ubuntu-latest
    defaults: { run: { working-directory: babun-crm/apps/web } }
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 22, cache: npm, cache-dependency-path: babun-crm/package.json }
      - run: cd .. && npm install --no-audit --no-fund
      - run: npm test -- --run

  wait-vercel:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    defaults: { run: { working-directory: . } }
    outputs:
      preview_url: ${{ steps.wait.outputs.url }}
    steps:
      - id: wait
        uses: patrickedqvist/wait-for-vercel-preview@v1.3.2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          max_timeout: 600
          check_interval: 15

  e2e:
    needs: [test, wait-vercel]
    runs-on: ubuntu-latest
    if: ${{ !cancelled() && needs.wait-vercel.result == 'success' }}
    defaults: { run: { working-directory: babun-crm/apps/web } }
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 22, cache: npm, cache-dependency-path: babun-crm/package.json }
      - run: cd .. && npm install --no-audit --no-fund
      - run: npx playwright install --with-deps chromium webkit
      - run: npx playwright test
        env:
          PLAYWRIGHT_BASE_URL: ${{ needs.wait-vercel.outputs.preview_url }}
          VERCEL_BYPASS_TOKEN: ${{ secrets.VERCEL_AUTOMATION_BYPASS_SECRET }}
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          E2E_TEST_PASSWORD: ${{ secrets.E2E_TEST_PASSWORD }}
      - if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: babun-crm/apps/web/playwright-report/
          retention-days: 14
